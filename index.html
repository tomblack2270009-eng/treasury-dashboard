<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>داشبورد خزانه | گروه پوزیترون</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Tahoma,Arial,sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e1b4b 50%,#0f172a);color:#e2e8f0;padding:20px}
.box{background:#111520;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:32px 26px;width:100%;max-width:360px;box-shadow:0 12px 40px rgba(0,0,0,.45)}
.logo{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;margin:0 auto 16px}
h1{font-size:17px;text-align:center;margin-bottom:6px}
.sub{font-size:12px;color:#94a3b8;text-align:center;margin-bottom:20px}
input[type=password]{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:#0d1b2a;color:#fff;font-size:14px;outline:none;margin-bottom:12px}
input[type=password]:focus{border-color:#3b82f6}
button{width:100%;padding:12px;border-radius:10px;border:none;background:#2563eb;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
button:hover{background:#1d4ed8}
.err{color:#f87171;font-size:12px;text-align:center;margin-top:10px;min-height:16px}
.rem{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8;margin-bottom:12px}
.rem input{width:auto;margin:0}
</style>
</head>
<body>
<div class="box">
  <div class="logo">P+</div>
  <h1>گزارش خزانه پوزیترون</h1>
  <div class="sub">برای مشاهده‌ی گزارش، رمز را وارد کنید</div>
  <form id="f">
    <input type="password" id="pw" placeholder="رمز عبور" autofocus autocomplete="current-password">

    <button type="submit">ورود</button>
    <div class="err" id="err"></div>
  </form>
</div>

function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function decrypt(pw){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey('raw',enc.encode(pw),{name:'PBKDF2'},false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
  return new TextDecoder().decode(pt);
}
async function tryPw(pw){
  var html=await decrypt(pw);

  // نمایش گزارشِ رمزگشایی‌شده داخل iframe تمام‌صفحه (اجرای مطمئنِ اسکریپت‌ها)
  try{document.head.innerHTML='';}catch(e){}
  document.title='داشبورد خزانه | گروه پوزیترون';
  document.documentElement.style.cssText='margin:0;height:100%';
  document.body.style.cssText='margin:0;height:100%;background:#0a0d14';
  document.body.innerHTML='';
  var f=document.createElement('iframe');
  f.setAttribute('title','گزارش خزانه');
  f.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;border:0;margin:0';
  f.srcdoc=html;
  document.body.appendChild(f);
}
document.getElementById('f').addEventListener('submit',async function(e){
  e.preventDefault();
  var err=document.getElementById('err');err.textContent='';
  if(!(window.crypto&&window.crypto.subtle)){err.textContent='این حالت نمایش از رمزگشایی پشتیبانی نمی‌کند؛ صفحه را از لینک https سایت باز کنید.';return;}
  try{await tryPw(document.getElementById('pw').value);}
  catch(_){console.error(_);err.textContent='رمز اشتباه است';}
});
(function(){try{localStorage.removeItem('px_pw');sessionStorage.removeItem('px_pw');}catch(e){}})();
